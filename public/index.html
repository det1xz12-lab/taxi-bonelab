<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Russian RP Taxi</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

header{
    background:#222;
    padding:20px;
    text-align:center;
    border-bottom:3px solid gold;
}

h1{
    margin:0;
    color:gold;
}

.container{
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    margin-bottom:15px;
    box-sizing:border-box;
}

#enableBtn{
    width:100%;
    padding:15px;
    font-size:18px;
    background:gold;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:20px;
}

.section{
    margin-top:20px;
}

.order{
    background:#222;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.order button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}

.acceptBtn{
    background:gold;
}

.completeBtn{
    background:#4CAF50;
    color:white;
}

h2{
    color:gold;
}

</style>
</head>
<body>

<header>
    <h1>🚕 Russian RP Taxi</h1>
</header>

<div class="container">

    <input
        id="driverName"
        placeholder="Введите ваш ник"
    >

    <button id="enableBtn">
        🔊 Начать смену
    </button>

    <div class="section">

        <h2>
            🚕 Свободные заказы
        </h2>

        <div id="freeOrders"></div>

    </div>

    <div class="section">

        <h2>
            🚖 Заказы в работе
        </h2>

        <div id="workingOrders"></div>

    </div>

</div>

<audio id="taxiSound">
    <source
        src="/sounds/jandeks-zakaz.mp3"
        type="audio/mpeg"
    >
</audio>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const sound =
    document.getElementById(
        "taxiSound"
    );

let soundEnabled =
    false;

const savedName =
    localStorage.getItem(
        "driverName"
    );

if(savedName){

    document
        .getElementById(
            "driverName"
        )
        .value =
        savedName;

}

document
.getElementById(
    "enableBtn"
)
.addEventListener(
    "click",
    async () => {

        const name =
            document
            .getElementById(
                "driverName"
            )
            .value
            .trim();

        if(!name){

            alert(
                "Введите ник"
            );

            return;

        }

        localStorage.setItem(
            "driverName",
            name
        );

        try{

            await sound.play();

            sound.pause();

            sound.currentTime = 0;

            soundEnabled =
                true;

            alert(
                "Смена начата"
            );

        }catch(err){

            console.error(
                err
            );

        }

    }
);

function createOrderCard(
    order
){

    const div =
        document.createElement(
            "div"
        );

    div.className =
        "order";

    div.id =
        `order-${order.id}`;

    if(
        order.status ===
        "working"
    ){

        div.innerHTML = `
            <h3>
                🚕 Заказ #${order.id}
            </h3>

            <p>
                👤 Игрок:
                ${order.player}
            </p>

            <p>
                📍 Откуда:
                ${order.from}
            </p>

            <p>
                🎯 Куда:
                ${order.to}
            </p>

            <p>
                🚖 Выполняет:
                ${order.acceptedBy}
            </p>

            <button
                class="completeBtn"
                onclick="
                completeOrder(
                    ${order.id}
                )"
            >
                ✅ Выполнено
            </button>
        `;

    }else{

        div.innerHTML = `
            <h3>
                🚕 Заказ #${order.id}
            </h3>

            <p>
                👤 Игрок:
                ${order.player}
            </p>

            <p>
                📍 Откуда:
                ${order.from}
            </p>

            <p>
                🎯 Куда:
                ${order.to}
            </p>

            <button
                class="acceptBtn"
                onclick="
                acceptOrder(
                    ${order.id}
                )"
            >
                Принять заказ
            </button>
        `;

    }

    return div;

}

socket.on(
    "newOrder",
    order => {

        if(
            soundEnabled
        ){

            sound.currentTime =
                0;

            sound.play()
                .catch(
                    console.error
                );

        }

        document
            .getElementById(
                "freeOrders"
            )
            .prepend(
                createOrderCard(
                    order
                )
            );

    }
);

socket.on(
    "orderAccepted",
    order => {

        const old =
            document
            .getElementById(
                `order-${order.id}`
            );

        if(old)
            old.remove();

        document
            .getElementById(
                "workingOrders"
            )
            .prepend(
                createOrderCard(
                    order
                )
            );

    }
);

socket.on(
    "orderCompleted",
    data => {

        const card =
            document
            .getElementById(
                `order-${data.id}`
            );

        if(card)
            card.remove();

    }
);

async function acceptOrder(
    id
){

    const driver =
        localStorage.getItem(
            "driverName"
        );

    if(
        !driver
    ){

        alert(
            "Введите ник"
        );

        return;

    }

    await fetch(
        "/accept-order",
        {
            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                id,
                driver

            })

        }
    );

}

async function completeOrder(
    id
){

    await fetch(
        "/complete-order",
        {
            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                id

            })

        }
    );

}

async function loadOrders(){

    const response =
        await fetch(
            "/orders"
        );

    const orders =
        await response.json();

    orders.reverse();

    orders.forEach(
        order => {

            if(
                order.status ===
                "working"
            ){

                document
                    .getElementById(
                        "workingOrders"
                    )
                    .appendChild(
                        createOrderCard(
                            order
                        )
                    );

            }else{

                document
                    .getElementById(
                        "freeOrders"
                    )
                    .appendChild(
                        createOrderCard(
                            order
                        )
                    );

            }

        }
    );

}

loadOrders();

</script>

</body>
</html>
